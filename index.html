
<!DOCTYPE html>
<html>
<head>
  <title>Anime Stream Pribadi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; padding: 10px; }
    input { padding: 10px; width: 70%; border-radius: 5px; border: none; }
    button { padding: 10px; background: #e63946; color: #fff; border: none; border-radius: 5px; }
    #results { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
    .anime { width: 46%; background: #222; border-radius: 8px; overflow: hidden; cursor: pointer; }
    .anime img { width: 100%; height: auto; }
    .anime p { padding: 5px; margin: 0; font-size: 14px; }
    .anime small { padding: 5px; color: #aaa; font-size: 12px; display: block; }
  </style>
</head>
<body>
  <h2>Anime Stream Pribadi</h2>
  <input type="text" id="searchInput" placeholder="Cari anime...">
  <button onclick="cari()">Cari</button>
  <div id="results"></div>

  <script>
    async function cari() {
      const q = document.getElementById('searchInput').value;
      const container = document.getElementById('results');
      container.innerHTML = '<p>Mencari... <i>sebentar, njir</i></p>';
      try {
        const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=10`);
        const data = await res.json();
        container.innerHTML = '';
        if (data.data && data.data.length > 0) {
          data.data.forEach(anime => {
            const div = document.createElement('div');
            div.className = 'anime';
            div.innerHTML = `
              <img src="${anime.images.jpg.large_image_url}" alt="${anime.title}">
              <p>${anime.title}</p>
              <small>${(anime.synopsis || 'Tidak ada sinopsis.').substring(0,100)}...</small>
            `;
            container.appendChild(div);
          });
        } else {
          container.innerHTML = '<p>Ga nemu njir, coba keyword lain.</p>';
        }
      } catch(e) {
        container.innerHTML = '<p>Error njir: Gagal ambil data. Coba lagi nanti.</p>';
      }
    }
  </script>
</body>
</html>
